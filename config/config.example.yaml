# 全局配置示例（YAML）
# 复制为 config.yaml 后按需修改。敏感信息建议通过 .env 或环境变量注入。

base_url: https://api.example.com
timeout: 30

headers:
  Content-Type: application/json
  Accept: application/json

auth:
  type: bearer
  # token 请勿写死在此文件，改用环境变量 APITEST_AUTH__TOKEN
  token: ""

# 环境级配置：覆盖上方全局配置
environments:
  dev:
    base_url: https://dev.api.example.com
    timeout: 10
  staging:
    base_url: https://staging.api.example.com
  prod:
    base_url: https://api.example.com
    timeout: 60
