<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宠物上门喂养 - 预约订单</title>
  <style>
    :root {
      --primary: #ff8c42;
      --primary-dark: #e07030;
      --accent: #4caf93;
      --bg: #faf6f1;
      --card: #fff;
      --text: #333;
      --muted: #888;
      --border: #eee;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }
    .header {
      text-align: center;
      padding: 24px 0;
    }
    .header h1 { font-size: 22px; margin-bottom: 6px; }
    .header p { color: var(--muted); font-size: 14px; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
    }
    .form-group textarea { min-height: 70px; resize: vertical; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .service-options {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .service-option {
      text-align: center;
      padding: 14px 8px;
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .service-option.active {
      border-color: var(--primary);
      background: rgba(255,140,66,0.06);
    }
    .service-option .price {
      display: block;
      font-size: 18px;
      font-weight: 700;
      color: var(--primary-dark);
      margin-top: 4px;
    }
    .service-option .name {
      font-size: 13px;
      color: var(--text);
    }
    .pay-options { display: grid; gap: 10px; }
    .pay-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .pay-option.active { border-color: var(--primary); }
    .pay-option input[type="radio"] { accent-color: var(--primary); }
    .order-summary { font-size: 14px; }
    .order-summary .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px dashed var(--border);
    }
    .order-summary .row:last-child { border-bottom: none; }
    .order-summary .total {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary-dark);
    }
    .btn-submit {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      transition: opacity 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .success-msg {
      display: none;
      text-align: center;
      padding: 30px 20px;
    }
    .success-msg .icon { font-size: 48px; margin-bottom: 12px; }
    .success-msg h2 { font-size: 20px; margin-bottom: 8px; color: var(--accent); }
    .success-msg p { color: var(--muted); font-size: 14px; line-height: 1.8; }
    .error-msg {
      display: none;
      color: #d32f2f;
      font-size: 13px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🐾 宠物上门喂养</h1>
      <p>专业喂养师上门，让毛孩子安心在家</p>
    </div>

    <form id="orderForm">
      <div class="card">
        <div class="card-title">选择服务</div>
        <div class="service-options" id="serviceOptions">
          <div class="service-option active" data-price="68">
            <span class="name">基础喂养</span>
            <span class="price">¥68</span>
          </div>
          <div class="service-option" data-price="98">
            <span class="name">精细照护</span>
            <span class="price">¥98</span>
          </div>
          <div class="service-option" data-price="128">
            <span class="name">长时陪伴</span>
            <span class="price">¥128</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">预约信息</div>
        <div class="form-row">
          <div class="form-group">
            <label>联系人</label>
            <input type="text" id="name" placeholder="您的姓名" required />
          </div>
          <div class="form-group">
            <label>手机号</label>
            <input type="tel" id="phone" placeholder="联系电话" required />
          </div>
        </div>
        <div class="form-group">
          <label>上门地址</label>
          <input type="text" id="address" placeholder="小区/楼栋/门牌号" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>宠物类型</label>
            <select id="petType">
              <option value="猫咪">猫咪</option>
              <option value="狗狗">狗狗</option>
              <option value="仓鼠/兔子">仓鼠/兔子</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group">
            <label>宠物数量</label>
            <select id="petCount">
              <option value="1">1只</option>
              <option value="2">2只</option>
              <option value="3">3只</option>
              <option value="4">4只及以上</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>服务日期</label>
            <input type="date" id="serviceDate" required />
          </div>
          <div class="form-group">
            <label>上门时段</label>
            <select id="timeSlot">
              <option value="09:00-11:00">09:00-11:00</option>
              <option value="11:00-13:00">11:00-13:00</option>
              <option value="14:00-16:00">14:00-16:00</option>
              <option value="16:00-18:00">16:00-18:00</option>
              <option value="19:00-21:00">19:00-21:00</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>服务次数</label>
          <select id="visitCount">
            <option value="1">1次</option>
            <option value="2">2次</option>
            <option value="3">3次</option>
            <option value="5">5次</option>
            <option value="7">7次（周套餐）</option>
          </select>
        </div>
        <div class="form-group">
          <label>备注</label>
          <textarea id="note" placeholder="喂食量、猫砂位置、特殊需求等"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="card-title">支付方式</div>
        <div class="pay-options">
          <label class="pay-option active">
            <input type="radio" name="payment" value="微信支付" checked /> 微信支付
          </label>
          <label class="pay-option">
            <input type="radio" name="payment" value="支付宝" /> 支付宝
          </label>
          <label class="pay-option">
            <input type="radio" name="payment" value="银行卡" /> 银行卡
          </label>
        </div>
      </div>

      <div class="card">
        <div class="card-title">订单明细</div>
        <div class="order-summary">
          <div class="row"><span>服务项目</span><span id="sumService">基础喂养</span></div>
          <div class="row"><span>服务次数</span><span id="sumVisits">1次</span></div>
          <div class="row"><span>宠物数量</span><span id="sumPets">1只</span></div>
          <div class="row"><span>多宠加收</span><span id="sumExtra">¥0</span></div>
          <div class="row"><span>支付方式</span><span id="sumPay">微信支付</span></div>
          <div class="row">
            <span>合计</span>
            <span class="total" id="sumTotal">¥68</span>
          </div>
        </div>
      </div>

      <div class="error-msg" id="errorMsg">请填写完整的预约信息</div>
      <button type="submit" class="btn-submit">确认支付</button>
      <p style="text-align:center;color:#aaa;font-size:12px;margin-top:10px;">本页为功能演示，不会发起真实扣款</p>
    </form>

    <div class="card success-msg" id="successMsg">
      <div class="icon">✅</div>
      <h2>预约成功</h2>
      <p id="successDetail"></p>
    </div>
  </div>

  <script>
    const serviceNames = { 68: '基础喂养', 98: '精细照护', 128: '长时陪伴' };
    let selectedPrice = 68;

    const form = document.getElementById('orderForm');
    const serviceOptions = document.querySelectorAll('.service-option');
    const payOptions = document.querySelectorAll('.pay-option');

    document.getElementById('serviceDate').min = new Date().toISOString().split('T')[0];

    serviceOptions.forEach(opt => {
      opt.addEventListener('click', () => {
        serviceOptions.forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        selectedPrice = Number(opt.dataset.price);
        updateSummary();
      });
    });

    payOptions.forEach(opt => {
      opt.addEventListener('click', () => {
        payOptions.forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        updateSummary();
      });
    });

    document.getElementById('visitCount').addEventListener('change', updateSummary);
    document.getElementById('petCount').addEventListener('change', updateSummary);

    function getPayment() {
      return document.querySelector('input[name="payment"]:checked').value;
    }

    function calcTotal() {
      const visits = Number(document.getElementById('visitCount').value);
      const pets = Number(document.getElementById('petCount').value);
      const extraPetFee = Math.max(pets - 2, 0) * 20 * visits;
      return selectedPrice * visits + extraPetFee;
    }

    function updateSummary() {
      const visits = Number(document.getElementById('visitCount').value);
      const pets = Number(document.getElementById('petCount').value);
      const extraPetFee = Math.max(pets - 2, 0) * 20 * visits;

      document.getElementById('sumService').textContent = serviceNames[selectedPrice];
      document.getElementById('sumVisits').textContent = visits + '次';
      document.getElementById('sumPets').textContent = pets + '只';
      document.getElementById('sumExtra').textContent = '¥' + extraPetFee;
      document.getElementById('sumPay').textContent = getPayment();
      document.getElementById('sumTotal').textContent = '¥' + calcTotal();
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const address = document.getElementById('address').value.trim();
      const date = document.getElementById('serviceDate').value;

      if (!name || !phone || !address || !date) {
        document.getElementById('errorMsg').style.display = 'block';
        return;
      }
      document.getElementById('errorMsg').style.display = 'none';

      const orderNo = 'PET' + Date.now().toString().slice(-8);
      const petType = document.getElementById('petType').value;
      const timeSlot = document.getElementById('timeSlot').value;
      const total = calcTotal();

      document.getElementById('successDetail').textContent =
        `订单号：${orderNo}\n` +
        `${name}，${date} ${timeSlot} 上门\n` +
        `服务：${serviceNames[selectedPrice]}，${petType} ${document.getElementById('petCount').value}只\n` +
        `${getPayment()}模拟支付 ¥${total}\n` +
        `喂养师确认后将通过 ${phone} 联系您`;

      form.style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    updateSummary();
  </script>
</body>
</html>
